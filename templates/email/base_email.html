<!doctype html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width"></head>
<body style="margin:0;padding:0;background:#F5EFEB;-webkit-font-smoothing:antialiased;font-family:'Segoe UI',Arial,Helvetica,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#F5EFEB;padding:28px 12px;">
    <tr><td align="center">
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:520px;width:100%;">
        <!-- Header -->
        <tr><td style="padding:4px 8px 18px;">
          <span style="font-size:22px;font-weight:700;letter-spacing:-0.5px;color:#2F4156;">◎ {{ brand }}</span>
        </td></tr>
        <!-- Card -->
        <tr><td style="background:#ffffff;border-radius:18px;padding:34px 32px;border:1px solid #e1e7ed;">
          {% block content %}{% endblock %}
        </td></tr>
        <!-- Footer -->
        <tr><td style="padding:22px 10px;color:#9aabc0;font-size:12px;line-height:1.5;">
          {{ brand }} — find &amp; book Melbourne's best photographers &amp; videographers.<br>
          <a href="{{ site_url }}" style="color:#567C8D;text-decoration:none;">{{ site_url }}</a> · Melbourne, Australia
          {% block footer_extra %}{% endblock %}
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
