{% comment %}Simple inline icon set keyed by `name`. Stroke = currentColor.{% endcomment %}
{% if name == "heart" %}
  <svg viewBox="0 0 24 24" fill="none" class="h-5 w-5"><path d="M12 20s-7-4.4-7-9.5A4.5 4.5 0 0112 7a4.5 4.5 0 017 3.5C19 15.6 12 20 12 20z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>
{% elif name == "sparkles" %}
  <svg viewBox="0 0 24 24" fill="none" class="h-5 w-5"><path d="M12 4l1.6 4.4L18 10l-4.4 1.6L12 16l-1.6-4.4L6 10l4.4-1.6L12 4zM18 14l.8 2.2L21 17l-2.2.8L18 20l-.8-2.2L15 17l2.2-.8L18 14z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
{% elif name == "home" %}
  <svg viewBox="0 0 24 24" fill="none" class="h-5 w-5"><path d="M4 11l8-6 8 6M6 10v9h12v-9" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
{% elif name == "briefcase" %}

{% elif name == "users" %}

{% elif name == "video" %}
  <svg viewBox="0 0 24 24" fill="none" class="h-5 w-5"><rect x="3" y="6" width="13" height="12" rx="2" stroke="currentColor" stroke-width="1.7"/><path d="M16 10l5-3v10l-5-3" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>
{% else %}
  <svg viewBox="0 0 24 24" fill="none" class="h-5 w-5"><circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.7"/></svg>
{% endif %}
