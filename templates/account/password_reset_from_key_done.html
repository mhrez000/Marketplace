{% extends "base_public.html" %}
{% block title %}Password changed — {{ BRAND_NAME }}{% endblock %}

{% block main %}
<section class="container-content flex justify-center py-16">
  <div class="auth-card card w-full max-w-md p-8 text-center">
    <span class="mx-auto grid h-12 w-12 place-items-center rounded-full bg-teal-500 text-2xl text-white">✓</span>
    <h1 class="mt-4 text-2xl">Password changed</h1>
    <p class="mt-2 text-sm text-navy-500">Your password has been updated. You can now log in with it.</p>
    <a href="{% url 'account_login' %}" class="btn-primary mt-6 w-full">Log in</a>
  </div>
</section>
{% endblock %}
