{% extends "base_public.html" %}
{% block title %}Reset password — {{ BRAND_NAME }}{% endblock %}

{% block main %}
<section class="container-content flex justify-center py-16">
  <div class="auth-card card w-full max-w-md p-8">
    <h1 class="text-2xl">Reset your password</h1>
    <p class="mt-1 text-sm text-navy-500">Enter your email and we'll send you a link to set a new one.</p>

    <form method="post" action="{% url 'account_reset_password' %}" class="mt-6">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn-primary mt-2 w-full">Send reset link</button>
    </form>

    <p class="mt-6 text-center text-sm text-navy-500">
      Remembered it? <a href="{% url 'account_login' %}" class="font-semibold text-teal-600 hover:underline">Back to log in</a>
    </p>
  </div>
</section>
{% endblock %}
