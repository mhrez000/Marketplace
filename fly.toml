# Fly.io config for Lens. Sydney region (AU data residency, build plan §10).
# `fly launch` rewrites the app name; the public host (ALLOWED_HOSTS, CSRF,
# SITE_URL) is derived automatically from FLY_APP_NAME in settings/prod.py.
app = "lens"
primary_region = "syd"

[build]

[env]
  DJANGO_SETTINGS_MODULE = "config.settings.prod"
  PORT = "8080"

# Run migrations on every deploy, before the new release goes live.
[deploy]
  release_command = "python manage.py migrate --noinput"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "get"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
