# Fly.io config for Lens (app created via fly launch).
# Public host (ALLOWED_HOSTS / CSRF / SITE_URL) is derived automatically from
# FLY_APP_NAME in config/settings/prod.py. Static files are served by WhiteNoise.
app = 'lens'
primary_region = 'syd'
console_command = '/app/manage.py shell'

[build]

# SQLite lives on a persistent volume mounted here (demo DB, no separate server).
[mounts]
  source = 'lens_data'
  destination = '/data'

[env]
  DJANGO_SETTINGS_MODULE = 'config.settings.prod'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '10s'
    method = 'get'
    path = '/healthz'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpus = 1
  memory_mb = 512
