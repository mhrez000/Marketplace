name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff

      - name: Lint (ruff)
        run: ruff check . --output-format=github
        continue-on-error: true

      - name: Run tests
        run: python manage.py test --settings=config.settings.test --verbosity=2

  deploy:
    # Auto-deploy to Fly on push to the default branch. Skips cleanly until a
    # FLY_API_TOKEN repo secret is configured (secrets aren't readable in
    # job-level `if`, so the check lives in a step).
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Check for Fly token
        id: fly
        run: echo "has=${{ secrets.FLY_API_TOKEN != '' }}" >> "$GITHUB_OUTPUT"
      - name: No token — skipping deploy
        if: steps.fly.outputs.has != 'true'
        run: echo "FLY_API_TOKEN not set; build verified, deploy skipped."
      - uses: actions/checkout@v4
        if: steps.fly.outputs.has == 'true'
      - uses: superfly/flyctl-actions/setup-flyctl@master
        if: steps.fly.outputs.has == 'true'
      - run: flyctl deploy --remote-only
        if: steps.fly.outputs.has == 'true'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
